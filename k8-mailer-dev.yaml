---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailer-dev
  namespace: e-commerce
  labels:
    app: mailer-dev-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailer-dev-pod
  template:
    metadata:
      labels:
        app: mailer-dev-pod
    spec:
      containers:
        - name: mailer-dev
          image: maildev/maildev
          ports:
            - containerPort: 1080
              name: ui
            - containerPort: 1025
              name: smtp
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 1080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
---
# UI accessible from outside (browser)
apiVersion: v1
kind: Service
metadata:
  name: mailer-dev-ui
  namespace: e-commerce
  labels:
    app: mailer-dev-svc
spec:
  type: LoadBalancer
  ports:
    - port: 1080
      targetPort: 1080
      name: ui
      protocol: TCP
  selector:
    app: mailer-dev-pod
---
# SMTP only accessible internally by other services
apiVersion: v1
kind: Service
metadata:
  name: mailer-dev
  namespace: e-commerce
  labels:
    app: mailer-dev-smtp-svc
spec:
  type: ClusterIP
  ports:
    - port: 1025
      targetPort: 1025
      name: smtp
      protocol: TCP
  selector:
    app: mailer-dev-pod
