---
apiVersion: v1
kind: ConfigMap
metadata:
  name: product-service-configuration
  namespace: e-commerce
data:
  application.yml: |
    spring:
      config:
        import: optional:configserver:http://config-service-svc:8888
      application:
        name: product-service
---
apiVersion: v1
kind: Service
metadata:
  name: product-service-svc
  namespace: e-commerce
  labels:
    app: product-service-svc
spec:
  type: ClusterIP
  ports:
    - name: product-port
      port: 8050
      targetPort: 8050
      protocol: TCP
  selector:
    app: product-service-pod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service-dep
  namespace: e-commerce
  labels:
    app: product-service-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service-pod
  template:
    metadata:
      labels:
        app: product-service-pod
    spec:
      containers:
        - name: product-service-container
          image: product-service
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: config
              mountPath: /config/application.yml
              subPath: application.yml
          ports:
            - containerPort: 8050
              name: product-port
          env:
            - name: SPRING_CONFIG_ADDITIONAL_LOCATION
              value: "file:/config/"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8050
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8050
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 5
      volumes:
        - name: config
          configMap:
            name: product-service-configuration
