apiVersion: v1
kind: Service
metadata:
  name: config-service-svc
  namespace: e-commerce
  labels:
    app: config-service-svc
spec:
  type: ClusterIP
  ports:
    - name: config-svc-port
      port: 8888
      targetPort: 8888
      protocol: TCP
  selector:
    app: config-service-pod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-service-dep
  namespace: e-commerce
  labels:
    app: config-service-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-service-pod
  template:
    metadata:
      labels:
        app: config-service-pod
    spec:
      containers:
        - name: config-service-container
          image: config-server
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: root-config
              mountPath: /config/application.yml
              subPath: application.yml
            - name: configurations
              mountPath: /config/configurations
          ports:
            - containerPort: 8888
              name: config-svc-port
          env:
            - name: SPRING_CONFIG_ADDITIONAL_LOCATION
              value: "file:/config/"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
      volumes:
        - name: configurations
          configMap:
            name: config-server-configurations
        - name: root-config
          configMap:
            name: config-server-root-configuration
