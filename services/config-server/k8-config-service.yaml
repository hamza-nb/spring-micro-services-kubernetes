apiVersion: v1
kind: Service
metadata:
  name: config-service-svc
  labels:
    app: config-service-svc
spec:
  type: LoadBalancer
  ports:
    - name: config-svc-port
      port: 8888
      targetPort: 8888
      protocol: TCP
  selector:
    app: config-service-pod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-service-dep
  labels:
    app: config-service-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-service-pod
  template:
    metadata:
      labels:
        app: config-service-pod
    spec:
      containers:
        - name: config-service-container
          image: config-server
          imagePullPolicy: IfNotPresent
