---
apiVersion: v1
kind: ConfigMap
metadata:
  name: discovery-server-configuration
  namespace: e-commerce
data:
  application.yml: |
    spring:
      config:
        import: optional:configserver:http://config-service-svc:8888
      application:
        name: discovery-service
---
apiVersion: v1
kind: Service
metadata:
  name: discovery-service-svc
  namespace: e-commerce
  labels:
    app: discovery-service-svc
spec:
  type: LoadBalancer
  ports:
    - name: discovery-port
      port: 8761
      targetPort: 8761
      protocol: TCP
  selector:
    app: discovery-service-pod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-service-dep
  namespace: e-commerce
  labels:
    app: discovery-service-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discovery-service-pod
  template:
    metadata:
      labels:
        app: discovery-service-pod
    spec:
      containers:
        - name: discovery-service-container
          image: discovery-server
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: root-config
              mountPath: /config/application.yml
              subPath: application.yml
          ports:
            - containerPort: 8761
              name: discovery-port
          env:
            - name: SPRING_CONFIG_ADDITIONAL_LOCATION
              value: "file:/config/"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
      volumes:
        - name: root-config
          configMap:
            name: discovery-server-configuration
