---
apiVersion: v1
kind: ConfigMap
metadata:
  name: customer-service-configuration
  namespace: e-commerce
data:
  application.yml: |
    spring:
      config:
        import: optional:configserver:http://config-service-svc:8888
      application:
        name: customer-service
---
apiVersion: v1
kind: Service
metadata:
  name: customer-service-svc
  namespace: e-commerce
  labels:
    app: customer-service-svc
spec:
  type: ClusterIP
  ports:
    - name: customer-port
      port: 8090
      targetPort: 8090
      protocol: TCP
  selector:
    app: customer-service-pod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-service-dep
  namespace: e-commerce
  labels:
    app: customer-service-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: customer-service-pod
  template:
    metadata:
      labels:
        app: customer-service-pod
    spec:
      containers:
        - name: customer-service-container
          image: customer-service
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: config
              mountPath: /config/application.yml
              subPath: application.yml
          ports:
            - containerPort: 8090
              name: customer-port
          env:
            - name: SPRING_CONFIG_ADDITIONAL_LOCATION
              value: "file:/config/"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 5
      volumes:
        - name: config
          configMap:
            name: customer-service-configuration
