---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zipkin
  namespace: e-commerce
  labels:
    app: zipkin-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zipkin-pod
  template:
    metadata:
      labels:
        app: zipkin-pod
    spec:
      containers:
        - name: zipkin
          image: openzipkin/zipkin:3
          ports:
            - containerPort: 9411
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 9411
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 9411
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: zipkin
  namespace: e-commerce
  labels:
    app: zipkin-svc
spec:
  type: LoadBalancer
  ports:
    - port: 9411
      targetPort: 9411
      protocol: TCP
  selector:
    app: zipkin-pod
