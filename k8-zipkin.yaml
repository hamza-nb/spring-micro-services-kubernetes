apiVersion: apps/v1
kind: Deployment
metadata:
  name: zipkin
  labels:
    app: zipkin-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zipkin-pod
  template:
    metadata:
      labels:
        app: zipkin-pod
    spec:
      containers:
        - name: zipkin
          image: openzipkin/zipkin
          ports:
            - containerPort: 9411
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: zipkin
  labels:
    app: zipkin-svc
spec:
  type: LoadBalancer
  ports:
    - port: 9411
      targetPort: 9411
      protocol: TCP
  selector:
    app: zipkin-pod

