# Kind cluster configuration
# 1 control-plane + 2 workers
# MetalLB is used as the LoadBalancer provider (see kind-setup.sh)
apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: ecommerce

nodes:
  - role: control-plane
    kubeadmConfigPatches:
      # Enable MetalLB strict ARP at cluster creation time
      - |
        kind: KubeProxyConfiguration
        mode: "ipvs"
        ipvs:
          strictARP: true

  - role: worker
    labels:
      tier: app

  - role: worker
    labels:
      tier: app
